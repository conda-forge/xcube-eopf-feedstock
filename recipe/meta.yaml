{% set name = "xcube-eopf" %}
{% set version = "0.3.3" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/EOPF-Sample-Service/xcube-eopf/archive/v{{ version }}.tar.gz
  sha256: bd224cce47b3b967f00ab987b2cabe148aa6bdcedbf6391254a4711c702db723

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - dask
    - numpy
    - pyproj
    - pystac
    - pystac-client
    - shapely
    - xarray
    - xarray-eopf >=0.2.7
    - xcube >=1.11.0
    - xcube-resampling >=0.3.2
test:
  imports:
    - xcube_eopf
  requires:
    - python {{ python_min }}

about:
  summary: A xcube datastore implementation that allows for analysis-ready reading of ESA EOPF data products.
  home: https://github.com/EOPF-Sample-Service/xcube-eopf
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  description: xcube-eopf is a Python package
  dev_url: https://github.com/EOPF-Sample-Service/xcube-eopf

extra:
  recipe-maintainers:
    - pont-us
    - konstntokas
    - forman
